    <rect x="53" y="43" width="2" height="6"/><rect x="51" y="45" width="6" height="2"/>
    <rect x="31" y="4"  width="2" height="5"/><rect x="29" y="6"  width="6" height="2"/>
    <rect x="47" y="30" width="2" height="4"/><rect x="46" y="31" width="4" height="2"/>
  </g>

