  <rect x="21" y="32" width="3" height="2" fill="#63e06a"/>
  <rect x="26" y="32" width="15" height="2" fill="#233f6e"/>

  <!-- GTL wordmark -->
  <text x="32" y="57" text-anchor="middle" font-family="'Courier New', ui-monospace, monospace" font-weight="700" font-size="16" letter-spacing="1" fill="#f3e4c4">GTL</text>
